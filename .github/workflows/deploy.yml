name: ZaryxNear-Docs-CICD
on:
  push:
    branches:
      - 'master'

jobs:
  Docs-CICD:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Notify deployment starting
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d '{
              "embeds": [{
                "author": {
                  "name": "ZaryxNear Deployment",
                  "icon_url": "https://zaryxnear.dev/assets/zaryxnear_logo.png"
                },
                "fields": [
                  {"name": "Service", "value": "`zaryxnear-docs`", "inline": true},
                  {"name": "Status", "value": "🔄 Deploying", "inline": true},
                  {"name": "Extra Info", "value": "Service may be briefly unavailable during deployment.", "inline": false}
                ],
                "color": 3447003,
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          buildkitd-flags: --debug

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Maven
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Build with Maven
        run: mvn -pl app,autogen -am clean package -DskipTests

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/zaryxnear-docs:${{ steps.vars.outputs.sha_short }}
            ${{ secrets.DOCKER_USERNAME }}/zaryxnear-docs:latest
          provenance: true
          sbom: true

      - name: Deploy on remote server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/zaryxnear-docs:${{ steps.vars.outputs.sha_short }}
            docker stop zaryxnear-docs || true
            docker rm zaryxnear-docs || true
            
            docker run -d --name zaryxnear-docs \
              --network zaryxnear-net \
              --network-alias docs \
              -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
              --restart unless-stopped \
              --memory="512m" \
              --memory-swap="512m" \
              --cpus="0.5" \
              --read-only \
              --tmpfs /tmp:size=100M \
              --security-opt=no-new-privileges:true \
              ${{ secrets.DOCKER_USERNAME }}/zaryxnear-docs:${{ steps.vars.outputs.sha_short }}

      - name: Notify deployment complete
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d '{
              "embeds": [{
                "author": {
                  "name": "ZaryxNear Deployment",
                  "icon_url": "https://zaryxnear.dev/assets/zaryxnear_logo.png"
                },
                "fields": [
                  {"name": "Service", "value": "`zaryxnear-docs`", "inline": true},
                  {"name": "Status", "value": "✅ Online", "inline": true},
                  {"name": "Commit", "value": "`${{ steps.vars.outputs.sha_short }}`", "inline": true}
                ],
                "color": 65280,
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notify deployment failed
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d '{
              "embeds": [{
                "author": {
                  "name": "ZaryxNear Deployment",
                  "icon_url": "https://zaryxnear.dev/assets/zaryxnear_logo.png"
                },
                "fields": [
                  {"name": "Service", "value": "`zaryxnear-docs`", "inline": true},
                  {"name": "Status", "value": "❌ Failed", "inline": true},
                  {"name": "Commit", "value": "`${{ steps.vars.outputs.sha_short }}`", "inline": true}
                ],
                "color": 16711680,
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK }}
